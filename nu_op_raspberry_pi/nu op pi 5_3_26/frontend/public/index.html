<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanderlande Sensor Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- Sidebar - nieuwe menu items -->
    <div class="sidebar">
        <a onclick="scrollToSection('home-top')">Home</a>
        <a onclick="scrollToSection('realtime-heading')">Realtime Data</a>
        <a onclick="scrollToSection('grafiek-heading')">Grafiek</a>
    </div>

    <!-- Header -->
    <header class="site-header">
        <h1>Vanderlande Sensor Dashboard</h1>
    </header>

    <!-- Content -->
    <div class="content">

        <!-- HOME PAGINA (geen pagina's meer, gewoon één pagina) -->
        <div id="home-page">
            <!-- Anker voor Home -->
            <div id="home-top"></div>
            
            <h2>Home</h2>
            <p>Welkom bij het Vanderlande sensor systeem!</p>

            <br>

            <!-- Track container -->
            <div class="track-container" id="homeTrackContainer"></div>

            <br><br>

            <!-- Realtime Data sectie -->
            <h2 id="realtime-heading">Realtime Data</h2>
            <div id="realtime">Laden...</div>
            
            <br><br>

            <!-- Grafiek sectie -->
            <h2 id="grafiek-heading">Grafiek</h2>
            <canvas id="grafiek"></canvas>

        </div>

    </div> <!-- einde content -->

    <!-- Config en app -->
    <script src="/js/config.js"></script>
    <script src="/js/app.js"></script>

</body>
</html>
