<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 4TW Dashboard</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="sidebar">
        <a href="#trackSection">Track</a>
        <a href="#bandenSection">Banden</a>
        <a href="#cartsSection">Carts</a>
        <a href="#sensorsSection">Sensors</a>
    </div>

    <header class="site-header">
        4TW Dashboard
    </header>

    <div class="content">

        <div id="trackSection" class="section">
            <h1>Track Data</h1>
            <div class="track-container">
                <div class="track">
                    <div class="track-segment">S1</div>
                    <div class="track-segment">S2</div>
                    <div class="track-segment">S3</div>
                    <div class="track-segment">S4</div>
                </div>
            </div>
        </div>

        <div id="controlsWrapper">
            <div class="segment-color-controls">
                <h1>Track kleur aanpassen</h1>
                <label for="segmentColorSelect">Kies segment:</label>
                <select id="segmentColorSelect"></select>
                <label for="colorSelect">Kies kleur:</label>
                <select id="colorSelect"></select>
                <button onclick="applySegmentColor()">Wijzig kleur</button>
            </div>

            <div class="cart-move-controls">
                <h1>Cart verplaatsen</h1>
                <label for="cartMoveSelect">Kies karretje:</label>
                <select id="cartMoveSelect"></select>
                <label for="cartMoveSegment">Kies segment:</label>
                <select id="cartMoveSegment"></select>
                <button onclick="moveSelectedCart()">Verplaats</button>
            </div>

            <div class="cart-color-controls">
                <h1>Cart kleur aanpassen</h1>
                <label for="cartColorSelect">Kies karretje:</label>
                <select id="cartColorSelect"></select>
                <label for="cartColorChoose">Kies kleur:</label>
                <select id="cartColorChoose"></select>
                <button onclick="colorSelectedCart()">Wijzig kleur</button>
            </div>
        </div>

        <div id="bandenSection" class="section">
            <h1>Banden</h1>
            <p>Hier staat informatie over banden.</p>
        </div>

        <div id="cartsSection" class="section">
            <h1>Carts</h1>
            <p>Hier komt info over carts.</p>
        </div>

        <div id="sensorsSection" class="section">
            <h1>Sensors</h1>
            <p>Hier komt info over sensors.</p>
        </div>

    </div> 

</body>
</html>
